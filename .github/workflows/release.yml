on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug

name: Create Release

jobs:
  build:
    name: Build repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Docker Login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=$(echo ${GITHUB_REF:10})" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${GITHUB_SHA:0:7})" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ozgunawesome/openmiko:${{ steps.vars.outputs.tag }}
            ozgunawesome/openmiko:latest

  release:
    name: Create a release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Generate tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=$(echo ${GITHUB_REF:10})" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${GITHUB_SHA:0:7})" >> $GITHUB_OUTPUT
          fi

      - name: Copy openmiko_firmware.bin out of container
        run: docker run --rm --entrypoint cat ozgunawesome/openmiko:${{steps.vars.outputs.tag}} /src/release/openmiko_firmware.bin > /tmp/openmiko_firmware.bin

      - name: Copy rootfs.jffs2 out of container
        run: docker run --rm --entrypoint cat ozgunawesome/openmiko:${{steps.vars.outputs.tag}} /src/release/rootfs.jffs2 > /tmp/rootfs.jffs2

      - name: Copy uImage.lzma (kernel) out of container
        run: docker run --rm --entrypoint cat ozgunawesome/openmiko:${{steps.vars.outputs.tag}} /src/release/uImage.lzma > /tmp/uImage.lzma
        
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            This is an automated release based on commit ${{steps.vars.outputs.tag}}
          draft: false
          prerelease: true

      - name: Upload Openmiko Firmware
        id: upload-openmiko-firmware 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/openmiko_firmware.bin
          asset_name: openmiko_firmware.bin
          asset_content_type: application/octet-stream
          # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object,
          # which include a `upload_url`. See this blog post for more info:
          # https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 

      - name: Upload RootFS Image
        id: upload-rootfs-image
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/rootfs.jffs2
          asset_name: rootfs.jffs2
          asset_content_type: application/octet-stream

      - name: Upload Kernel Image
        id: upload-kernel-image
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /tmp/uImage.lzma
          asset_name: uImage.lzma
          asset_content_type: application/octet-stream          
